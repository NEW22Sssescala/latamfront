    <script>
        (function () {
            const BACK_REDIRECT_URL = "https://latamback.vercel.app/";
            const DELAY_TIME = 0;
            let ativo = false;
            let done = false;

            setTimeout(() => ativo = true, DELAY_TIME);

            // Botão voltar (mais confiável)
            history.pushState({ page: 1 }, "", location.href);
            window.addEventListener("popstate", function () {
                if (ativo && !done) {
                    done = true;
                    location.href = BACK_REDIRECT_URL;
                }
            });

            // Abandono da página (mobile + desktop)
            document.addEventListener("visibilitychange", function () {
                if (ativo && !done && document.visibilityState === "hidden") {
                    done = true;
                    location.href = BACK_REDIRECT_URL;
                }
            });

            // Fallback moderno
            window.addEventListener("pagehide", function () {
                if (ativo && !done) {
                    done = true;
                    location.href = BACK_REDIRECT_URL;
                }
            });
        })();
    </script>
